<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Market Bubbles — Live</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: #0a0e1a; color: #e4e6eb; min-height: 100vh; overflow-x: hidden; }

.header { background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
.header h1 { font-size: 17px; background: linear-gradient(135deg,#FFD700,#FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .sub { font-size: 10px; color: #6b7280; }
.controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.refresh-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e4e6eb; padding: 5px 12px; border-radius: 7px; font-size: 11px; cursor: pointer; }
.refresh-btn:active { transform: scale(0.96); }
.refresh-btn.loading { opacity: 0.6; pointer-events: none; }

.legend { display: flex; gap: 10px; justify-content: center; padding: 8px; font-size: 10px; color: #9aa0a6; flex-wrap: wrap; }
.cat-filter { display: flex; gap: 5px; justify-content: center; padding: 4px 8px 8px; flex-wrap: wrap; }
.cat-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #9aa0a6; padding: 4px 10px; border-radius: 12px; font-size: 10px; cursor: pointer; }
.cat-btn.active { background: rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.3); color: #FFD700; }

#bubbleCanvas { display: block; width: 100%; touch-action: none; }

.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
.modal.active { display: flex; }
.modal-content { background: #161b2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; max-width: 340px; width: 90%; text-align: center; }
.modal-logo { width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 8px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; overflow: hidden; }
.modal-logo img { width: 100%; height: 100%; object-fit: cover; }
.modal-name { font-size: 22px; font-weight: bold; margin-bottom: 4px; }
.modal-tag { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; margin: 6px 0; }
.modal-change { font-size: 28px; font-weight: bold; margin: 8px 0; font-family: monospace; }
.modal-price { font-size: 14px; color: #9aa0a6; margin-bottom: 8px; font-family: monospace; }
.modal-detail { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
.modal-detail .label { color: #9aa0a6; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.btn { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; border: none; font-family: inherit; font-weight: bold; }
.btn-primary { background: linear-gradient(135deg,#FFD700,#FFA500); color: #0a0e1a; }
.btn-secondary { background: rgba(255,255,255,0.08); color: #e4e6eb; }

.status-bar { text-align: center; padding: 8px; font-size: 10px; color: #6b7280; }
.live-badge { display: inline-flex; align-items: center; gap: 4px; color: #22c55e; }
.live-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
.live-dot.error { background: #ef4444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🫧 Market Bubbles</h1>
    <div class="sub">Live market data • Size = strength • Color = direction</div>
  </div>
  <div class="controls">
    <button class="refresh-btn" id="refreshBtn" onclick="fetchPrices()">🔄 Refresh</button>
  </div>
</div>

<div class="legend">
  <span>🚀 Big Green = Strong Up</span>
  <span>🌱 Small Green = Early Move</span>
  <span>⚠️ Big Red = Strong Down</span>
  <span>👆 Tap for details</span>
</div>

<div class="cat-filter">
  <button class="cat-btn active" onclick="filterCat('all',this)">All</button>
  <button class="cat-btn" onclick="filterCat('Metals',this)">🥇 Metals</button>
  <button class="cat-btn" onclick="filterCat('Energy',this)">🛢️ Energy</button>
  <button class="cat-btn" onclick="filterCat('Forex',this)">💱 Forex</button>
  <button class="cat-btn" onclick="filterCat('Crypto',this)">₿ Crypto</button>
  <button class="cat-btn" onclick="filterCat('Tech',this)">📱 Tech</button>
</div>

<canvas id="bubbleCanvas"></canvas>

<div class="status-bar" id="statusBar">
  <span class="live-badge"><span class="live-dot" id="liveDot"></span> <span id="statusText">Connecting to market...</span></span>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-logo" id="mLogo">$</div>
    <div class="modal-name" id="mName">Gold</div>
    <div class="modal-tag" id="mTag">🚀 Strong Up</div>
    <div class="modal-change" id="mChange">+1.2%</div>
    <div class="modal-price" id="mPrice">$4,322.50</div>
    <div class="modal-detail"><span class="label">Symbol</span><span id="mSymbol">XAU/USD</span></div>
    <div class="modal-detail"><span class="label">Category</span><span id="mCategory">Metals</span></div>
    <div class="modal-detail"><span class="label">Signal</span><span id="mAdvice">Watch for entry</span></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="openTV()">📊 Open Chart</button>
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
// ═══ Assets configuration ═══
const assets = [
  {id:'XAU', name:'Gold', sym:'XAU/USD', tvSym:'OANDA:XAUUSD', cat:'Metals', logo:'🥇', change:0, price:0},
  {id:'XAG', name:'Silver', sym:'XAG/USD', tvSym:'OANDA:XAGUSD', cat:'Metals', logo:'🥈', change:0, price:0},
  {id:'WTI', name:'Oil', sym:'WTI/USD', tvSym:'TVC:USOIL', cat:'Energy', logo:'🛢️', change:0, price:0},
  {id:'EUR', name:'Euro', sym:'EUR/USD', tvSym:'OANDA:EURUSD', cat:'Forex', logo:'€', change:0, price:0},
  {id:'GBP', name:'Pound', sym:'GBP/USD', tvSym:'OANDA:GBPUSD', cat:'Forex', logo:'£', change:0, price:0},
  {id:'JPY', name:'Yen', sym:'USD/JPY', tvSym:'OANDA:USDJPY', cat:'Forex', logo:'¥', change:0, price:0},
  {id:'DXY', name:'Dollar', sym:'DXY', tvSym:'TVC:DXY', cat:'Forex', logo:'$', change:0, price:0},
  {id:'BTC', name:'Bitcoin', sym:'BTC/USD', tvSym:'BINANCE:BTCUSDT', cat:'Crypto', logo:'₿', change:0, price:0},
  {id:'ETH', name:'Ethereum', sym:'ETH/USD', tvSym:'BINANCE:ETHUSDT', cat:'Crypto', logo:'Ξ', change:0, price:0},
  {id:'SOL', name:'Solana', sym:'SOL/USD', tvSym:'BINANCE:SOLUSDT', cat:'Crypto', logo:'◎', change:0, price:0},
  {id:'NVDA', name:'NVIDIA', sym:'NVDA', tvSym:'NASDAQ:NVDA', cat:'Tech', logo:'N', change:0, price:0},
  {id:'TSLA', name:'Tesla', sym:'TSLA', tvSym:'NASDAQ:TSLA', cat:'Tech', logo:'T', change:0, price:0},
  {id:'AAPL', name:'Apple', sym:'AAPL', tvSym:'NASDAQ:AAPL', cat:'Tech', logo:'', change:0, price:0},
];

// ═══ Smart classification (your idea) ═══
function classify(change){
  const c = change;
  if(c >= 2.5) return {tag:'🚀 Strong Up', color:[34,197,94], intensity:1, advice:'Mature strong move — watch overbought'};
  if(c >= 1.5) return {tag:'📈 Up', color:[34,197,94], intensity:0.7, advice:'Good uptrend'};
  if(c >= 0.3) return {tag:'🌱 Early Move', color:[74,222,128], intensity:0.4, advice:'Early rise — best for early entry'};
  if(c > -0.3) return {tag:'➡️ Neutral', color:[156,163,175], intensity:0.2, advice:'Quiet market — wait'};
  if(c > -1.5) return {tag:'📉 Early Drop', color:[248,113,113], intensity:0.4, advice:'Early weakness — caution'};
  if(c > -2.5) return {tag:'🔻 Down', color:[239,68,68], intensity:0.7, advice:'Downtrend'};
  return {tag:'⚠️ Strong Down', color:[239,68,68], intensity:1, advice:'Strong drop — stay away or consider sell'};
}
function bubbleRadius(change){ return Math.max(26, Math.min(80, 26 + Math.abs(change)*10)); }

const canvas = document.getElementById('bubbleCanvas');
const ctx = canvas.getContext('2d');
let bubbles = [], W, H, activeCat = 'all';

function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight - 175; }
resize();
window.addEventListener('resize', () => { resize(); initBubbles(); });

function initBubbles(){
  const visible = assets.filter(a => activeCat==='all' || a.cat===activeCat);
  bubbles = visible.map(a => ({
    ...a,
    x: Math.random()*(W-150)+75, y: Math.random()*(H-150)+75,
    vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
    radius: bubbleRadius(a.change)
  }));
}

function draw(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<bubbles.length;i++){
    const b = bubbles[i];
    b.x += b.vx; b.y += b.vy;
    if(b.x-b.radius<0||b.x+b.radius>W) b.vx*=-1;
    if(b.y-b.radius<0||b.y+b.radius>H) b.vy*=-1;
    b.x = Math.max(b.radius, Math.min(W-b.radius, b.x));
    b.y = Math.max(b.radius, Math.min(H-b.radius, b.y));
    for(let j=i+1;j<bubbles.length;j++){
      const o = bubbles[j];
      const dx=o.x-b.x, dy=o.y-b.y, dist=Math.hypot(dx,dy), minD=b.radius+o.radius+4;
      if(dist<minD && dist>0){ const push=(minD-dist)/2, ang=Math.atan2(dy,dx);
        b.x-=Math.cos(ang)*push; b.y-=Math.sin(ang)*push; o.x+=Math.cos(ang)*push; o.y+=Math.sin(ang)*push; }
    }
    const cls = classify(b.change);
    const [r,g,bl] = cls.color;
    const grad = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.radius);
    grad.addColorStop(0, `rgba(${r},${g},${bl},${0.2+cls.intensity*0.4})`);
    grad.addColorStop(0.7, `rgba(${r},${g},${bl},${0.12+cls.intensity*0.28})`);
    grad.addColorStop(1, `rgba(${r},${g},${bl},0.05)`);
    ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = `rgba(${r},${g},${bl},${0.5+cls.intensity*0.4})`;
    ctx.lineWidth = 1.5+cls.intensity; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font = `${Math.max(15,b.radius*0.42)}px serif`;
    ctx.fillText(b.logo || b.name[0], b.x, b.y - b.radius*0.22);
    ctx.font = `bold ${Math.max(9,b.radius*0.2)}px Arial`;
    ctx.fillText(b.name, b.x, b.y + b.radius*0.2);
    ctx.font = `bold ${Math.max(10,b.radius*0.22)}px monospace`;
    ctx.fillStyle = b.change>=0 ? '#4ade80' : '#f87171';
    ctx.fillText((b.change>=0?'+':'')+b.change.toFixed(1)+'%', b.x, b.y + b.radius*0.48);
  }
  requestAnimationFrame(draw);
}

canvas.addEventListener('click', e=>{
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX-rect.left, my = e.clientY-rect.top;
  for(const b of bubbles){ if(Math.hypot(mx-b.x,my-b.y)<b.radius){ showDetail(b); break; } }
});

let currentAsset = null;
function showDetail(b){
  currentAsset = b;
  document.getElementById('mLogo').textContent = b.logo || b.name[0];
  document.getElementById('mName').textContent = b.name;
  const cls = classify(b.change);
  const tag = document.getElementById('mTag');
  tag.textContent = cls.tag;
  tag.style.background = `rgba(${cls.color[0]},${cls.color[1]},${cls.color[2]},0.2)`;
  tag.style.color = `rgb(${cls.color[0]},${cls.color[1]},${cls.color[2]})`;
  const mc = document.getElementById('mChange');
  mc.textContent = (b.change>=0?'+':'')+b.change.toFixed(2)+'%';
  mc.style.color = b.change>=0 ? '#22c55e' : '#ef4444';
  document.getElementById('mPrice').textContent = b.price ? '$'+b.price.toLocaleString('en',{maximumFractionDigits:b.price<10?4:2}) : '—';
  document.getElementById('mSymbol').textContent = b.sym;
  document.getElementById('mCategory').textContent = b.cat;
  document.getElementById('mAdvice').textContent = cls.advice;
  document.getElementById('modal').classList.add('active');
}
function closeModal(){ document.getElementById('modal').classList.remove('active'); }
function openTV(){ if(currentAsset) window.open('https://www.tradingview.com/chart/?symbol='+encodeURIComponent(currentAsset.tvSym),'_blank'); }

function filterCat(cat, el){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  initBubbles();
}

// ═══ Fetch live prices from Netlify Function ═══
async function fetchPrices(){
  const btn = document.getElementById('refreshBtn');
  const dot = document.getElementById('liveDot');
  const txt = document.getElementById('statusText');
  btn.classList.add('loading');
  try{
    const res = await fetch('/api/prices');
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    let updated = 0;
    assets.forEach(a=>{
      const q = data[a.sym];
      if(q && q.percent_change !== undefined){
        a.change = parseFloat(q.percent_change) || 0;
        a.price = parseFloat(q.close) || 0;
        const bub = bubbles.find(b=>b.id===a.id);
        if(bub){ bub.change = a.change; bub.price = a.price; bub.radius = bubbleRadius(a.change); }
        updated++;
      }
    });
    dot.classList.remove('error');
    txt.textContent = `Live • ${updated} assets • ${new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    dot.classList.add('error');
    txt.textContent = 'Connection error — check Netlify setup';
    console.error('Fetch error:', e);
  }
  btn.classList.remove('loading');
}

initBubbles();
draw();
fetchPrices();
setInterval(fetchPrices, 60000); // refresh every minute
console.log('%c🫧 Market Bubbles ready', 'font-size:18px; color:#FFD700');
</script>
</body>
</html>
